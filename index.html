    .top-strip { box-shadow: 0 3px 0 rgba(20,33,61,.12); }

    .panel {

      box-shadow: 0 12px 35px rgba(20,33,61,.08);

      border: 1px solid var(--line); color: var(--muted);

      transition: .2s ease;

    .question-number {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--line); background: #fffdf7;
      color: var(--ink); font-weight: 800; font-size: 13px;
      position: relative; transition: transform .18s, border-color .18s, background .18s;
    }
    .question-number:hover { transform: translateY(-2px); border-color: var(--ink); }

    .question-number.flagged::after {

      color: var(--ink); transition: .18s ease;

      border-color: var(--teal); transform: translateX(4px);

    .flag-btn {

    .result-ring {

      background: conic-gradient(var(--teal) 0deg, #e6e0d5 0deg);
    }

    .toast {
      position: fixed; right: 20px; bottom: 20px; z-index: 80;
      background: var(--ink); color: #fff; padding: 12px 16px;

      {topic:"DHCP",q:"Gói tin đầu tiên (Discover) trong quy trình DHCP do máy trạm phát ra được gửi dưới dạng thức truyền tin nào?",o:["Anycast","Unicast (Gửi đích danh)","Multicast (Gửi nhóm)","Broadcast (Quảng bá toàn mạng)"],a:3,e:"Client chưa có IP và chưa biết DHCP Server nên DHCP Discover được phát dưới dạng broadcast."},

      {topic:"Active Directory",q:"Điều kiện tiên quyết về mặt cấu hình mạng của một máy chủ trước khi tiến hành nâng cấp lên Domain Controller là gì?",o:["Phải sử dụng địa chỉ IP động (DHCP)","Phải tắt hoàn toàn tính năng IPv4","Phải kết nối trực tiếp ra Internet","Phải cấu hình địa chỉ IP tĩnh (Static IP)"],a:3,e:"Domain Controller cần IP tĩnh để DNS và các máy trạm luôn định vị được máy chủ ổn định."},

      {topic:"SNMP",q:"Phiên bản SNMP nào hỗ trợ đầy đủ các tính năng bảo mật mạnh mẽ như xác thực nguồn gốc (Authentication) và mã hóa gói tin (Privacy)?",o:["SNMPv2c","SNMPv2","SNMPv1","SNMPv3"],a:3,e:"SNMPv3 hỗ trợ xác thực, kiểm tra toàn vẹn và mã hóa dữ liệu."},

      {topic:"Mạng cơ bản",q:"Thiết bị Router (Bộ định tuyến) hoạt động chủ yếu ở tầng nào của mô hình OSI?",o:["Tầng 3 (Network)","Tầng 4 (Transport)","Tầng 1 (Physical)","Tầng 2 (Data Link)"],a:0,e:"Router định tuyến gói IP giữa các mạng tại tầng Network, tức tầng 3."},

      {topic:"Group Policy",q:"Theo thứ tự mặc định kế thừa và áp dụng Group Policy (LSDOU), chính sách nào sẽ được áp dụng cuối cùng và đè lên các chính sách trước đó nếu có xung đột?",o:["Domain Policy","Site Policy","Organizational Unit (OU) Policy","Local Policy"],a:2,e:"LSDOU là Local → Site → Domain → OU; GPO ở OU được xử lý sau cùng và thường thắng khi xung đột."}
    ];

    let current = 0;
    let answers = Array(quizData.length).fill(null);
    let flagged = new Set();
    let submitted = false;
    let activeFilter = "all";
    let elapsed = 0;
    let timerPaused = false;
    let timerInterval;
    let wrongOnly = false;

    const $ = (id) => document.getElementById(id);
    const numberGrid = $("number-grid");
    const answerBox = $("answers");

    function createNavigator() {
      const fragment = document.createDocumentFragment();
      quizData.forEach((_, i) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "question-number";
        button.textContent = i + 1;
        button.dataset.index = i;
        button.setAttribute("aria-label", `Đi tới câu ${i + 1}`);
        button.addEventListener("click", () => {
          current = i;
          renderQuestion();
          if (window.innerWidth < 901) $("quiz-panel")?.scrollIntoView({behavior:"smooth", block:"start"});
        });
        fragment.appendChild(button);
      });
      numberGrid.appendChild(fragment);
    }

    function renderQuestion() {
      const item = quizData[current];
      $("question-index").textContent = `CÂU ${String(current + 1).padStart(2,"0")} / ${quizData.length}`;
      $("topic-chip").querySelector("span").textContent = item.topic;
      $("question-heading").textContent = item.q;
      $("flag-btn").classList.toggle("active", flagged.has(current));
      $("flag-btn").setAttribute("aria-pressed", String(flagged.has(current)));
      $("prev-btn").disabled = current === 0;
      $("next-btn").disabled = current === quizData.length - 1;

      const existing = new Map([...answerBox.children].map(el => [Number(el.dataset.option), el]));
      item.o.forEach((text, index) => {
        let button = existing.get(index);
        if (!button) {
          button = document.createElement("button");
          button.type = "button";
          button.className = "answer-option";
          button.dataset.option = index;
          button.setAttribute("role", "radio");
          button.innerHTML = `<span class="answer-letter">${String.fromCharCode(65 + index)}</span><span class="answer-copy leading-6"></span>`;
          button.addEventListener("click", () => selectAnswer(index));
          answerBox.appendChild(button);
        }
        button.querySelector(".answer-copy").textContent = text;
        button.className = "answer-option";
        button.disabled = submitted;
        const selected = answers[current] === index;
        button.setAttribute("aria-checked", String(selected));
        if (selected) button.classList.add("selected");
        if (submitted && index === item.a) button.classList.add("is-correct");
        if (submitted && selected && index !== item.a) button.classList.add("is-wrong");
        existing.delete(index);
      });
      existing.forEach(el => el.remove());

      const feedback = $("feedback");
      if (submitted) {
        feedback.classList.remove("hidden");
        const correct = answers[current] === item.a;
        $("feedback-status").textContent = correct ? "Chính xác!" : `Đáp án đúng: ${String.fromCharCode(65 + item.a)}. ${item.o[item.a]}`;
        $("feedback-status").style.color = correct ? "#256b32" : "#a43d1d";
        $("feedback-text").textContent = item.e;
      } else {
        feedback.classList.add("hidden");
      }
      updateNavigator();
    }

    function selectAnswer(index) {
      if (submitted) return;
      answers[current] = index;
      renderQuestion();
      updateProgress();
    }

    function updateProgress() {
      const count = answers.filter(v => v !== null).length;
      const percent = Math.round(count / quizData.length * 100);
      $("progress-copy").textContent = `Đã trả lời ${count}/${quizData.length} câu`;
      $("progress-percent").textContent = `${percent}%`;
      $("progress-fill").style.width = `${percent}%`;
      document.querySelector('[role="progressbar"]').setAttribute("aria-valuenow", count);
      updateNavigator();
    }

    function updateNavigator() {
      let visible = 0;
      [...numberGrid.children].forEach((button, i) => {
        button.className = "question-number";
        if (i === current) button.classList.add("current");
        if (flagged.has(i)) button.classList.add("flagged");
        if (submitted) {
          if (answers[i] === quizData[i].a) button.classList.add("correct");
          else button.classList.add("wrong");
        } else if (answers[i] !== null) {
          button.classList.add("answered");
        }
        const hide =
          (activeFilter === "unanswered" && answers[i] !== null) ||
          (activeFilter === "flagged" && !flagged.has(i)) ||
          (wrongOnly && submitted && answers[i] === quizData[i].a);
        if (hide) button.classList.add("hidden-filter");
        else visible++;
      });
      $("visible-count").textContent = `${visible} câu`;
    }

    function move(delta) {
      const target = current + delta;
      if (target >= 0 && target < quizData.length) {
        current = target;
        renderQuestion();
      }
    }

    function toggleFlag() {
      if (flagged.has(current)) {
        flagged.delete(current);
        showToast("Đã bỏ đánh dấu câu này");
      } else {
        flagged.add(current);
        showToast("Đã đánh dấu để xem lại");
      }
      renderQuestion();
    }

    function requestSubmit() {
      if (submitted) return;
      const blanks = answers.filter(v => v === null).length;
      if (blanks > 0) {
        $("confirm-message").textContent = `Bạn còn ${blanks} câu chưa trả lời. Các câu trống sẽ được tính là sai. Bạn vẫn muốn nộp bài?`;
        $("confirm-modal").classList.remove("hidden");
        $("continue-btn").focus();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      submitted = true;
      timerPaused = true;
      clearInterval(timerInterval);
      $("confirm-modal").classList.add("hidden");
      const correct = answers.reduce((sum, value, i) => sum + (value === quizData[i].a ? 1 : 0), 0);
      const blank = answers.filter(v => v === null).length;
      const wrong = quizData.length - correct - blank;
      const percent = Math.round(correct / quizData.length * 100);

      $("result-percent").textContent = `${percent}%`;
      $("result-score").textContent = `${correct}/${quizData.length} đúng`;
      $("correct-count").textContent = correct;
      $("wrong-count").textContent = wrong;
      $("blank-count").textContent = blank;
      $("result-ring").style.background = `conic-gradient(var(--teal) ${percent * 3.6}deg, #e6e0d5 0deg)`;

      let comment = "Hãy xem lại phần giải thích và củng cố các chủ đề còn yếu.";
      if (percent >= 90) comment = "Xuất sắc! Bạn đã nắm rất chắc kiến thức quản trị mạng.";
      else if (percent >= 75) comment = "Kết quả tốt! Chỉ cần ôn thêm một vài điểm dễ nhầm.";
      else if (percent >= 50) comment = "Bạn đã có nền tảng. Hãy xem lại các câu sai để tiến bộ nhanh hơn.";
      $("result-comment").textContent = comment;
      $("result-modal").classList.remove("hidden");
      renderQuestion();
      updateProgress();
      $("review-all-btn").focus();
    }

    function closeResult(filterWrong) {
      $("result-modal").classList.add("hidden");
      wrongOnly = filterWrong;
      activeFilter = "all";
      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.filter === "all"));
      if (filterWrong) {
        const firstWrong = quizData.findIndex((q, i) => answers[i] !== q.a);
        if (firstWrong >= 0) current = firstWrong;
      }
      renderQuestion();
      window.scrollTo({top: 0, behavior: "smooth"});
    }

    function restart() {
      answers = Array(quizData.length).fill(null);
      flagged = new Set();
      submitted = false;
      wrongOnly = false;
      current = 0;
      elapsed = 0;
      timerPaused = false;
      $("result-modal").classList.add("hidden");
      setTimerIcon(false);
      startTimer();
      updateProgress();
      renderQuestion();
      showToast("Đã bắt đầu một lượt ôn tập mới");
    }

    function formatTime(seconds) {
      const h = String(Math.floor(seconds / 3600)).padStart(2,"0");
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2,"0");
      const s = String(seconds % 60).padStart(2,"0");
      return `${h}:${m}:${s}`;
    }

    function startTimer() {
      clearInterval(timerInterval);
      $("timer").textContent = formatTime(elapsed);
      timerInterval = setInterval(() => {
        if (!timerPaused && !submitted) {
          elapsed++;
          $("timer").textContent = formatTime(elapsed);
        }
      }, 1000);
    }

    function setTimerIcon(paused) {
      const holder = $("timer-toggle");
      const oldIcon = holder.querySelector("svg, i");
      if (oldIcon) oldIcon.remove();
      const icon = document.createElement("i");
      icon.id = "timer-icon";
      icon.setAttribute("data-lucide", paused ? "play" : "pause");
      icon.className = "w-4 h-4";
      holder.prepend(icon);
      holder.setAttribute("aria-label", paused ? "Tiếp tục đồng hồ" : "Tạm dừng đồng hồ");
      lucide.createIcons();
    }

    function toggleTimer() {
      if (submitted) return;
      timerPaused = !timerPaused;
      setTimerIcon(timerPaused);
      showToast(timerPaused ? "Đã tạm dừng đồng hồ" : "Đã tiếp tục đồng hồ");
    }

    let toastTimeout;
    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    document.addEventListener("DOMContentLoaded", () => {
      createNavigator();
      renderQuestion();
      updateProgress();
      startTimer();
      lucide.createIcons();

      $("prev-btn").addEventListener("click", () => move(-1));
      $("next-btn").addEventListener("click", () => move(1));
      $("flag-btn").addEventListener("click", toggleFlag);
      $("submit-btn").addEventListener("click", requestSubmit);
      $("timer-toggle").addEventListener("click", toggleTimer);
      $("continue-btn").addEventListener("click", () => $("confirm-modal").classList.add("hidden"));
      $("confirm-submit-btn").addEventListener("click", finishQuiz);
      $("review-all-btn").addEventListener("click", () => closeResult(false));
      $("review-wrong-btn").addEventListener("click", () => closeResult(true));
      $("restart-btn").addEventListener("click", restart);

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeFilter = btn.dataset.filter;
          wrongOnly = false;
          document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b === btn));
          updateNavigator();
        });
      });

      document.addEventListener("keydown", (event) => {
        if (!$("confirm-modal").classList.contains("hidden") || !$("result-modal").classList.contains("hidden")) return;
        if (event.key === "ArrowLeft") move(-1);
        if (event.key === "ArrowRight") move(1);
        const key = event.key.toLowerCase();
        if (["a","b","c","d"].includes(key) && !submitted) selectAnswer(["a","b","c","d"].indexOf(key));
      });
    });
  </script>
 </body>
</html>
