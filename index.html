  <script>

                        {q:"Thành phần \"Actuator\" trong sơ đồ cấu tạo HDD giữ vai trò gì?",a:["Cung cấp tốc độ quay cho Platter","Điều khiển cánh tay mang đầu đọc/ghi di chuyển chính xác","Chuyển đổi tín hiệu quang thành tín hiệu điện","Lưu trữ các electron để tạo bit 0"],c:1},

                        {q:"Tia laser đi xuyên qua lớp nào đầu tiên trước khi chạm đến vùng Pit/Land?",a:["Lớp phản xạ","Lớp bảo vệ","Lớp polycarbonate","Lớp keo dính"],c:2},

        let currentSet = -1, currentQuestions = [], current = 0, score = 0;

        function selectSet(idx) {
            currentSet = idx;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('section-screen').classList.remove('hidden');
            const container = document.getElementById('section-buttons');
            container.innerHTML = '';
            const set = allSets[idx];
            // All button
            const allBtn = document.createElement('button');
            allBtn.className = 'section-btn w-full px-4 py-3 rounded-lg font-medium text-white bg-emerald-600';
            allBtn.textContent = `Tất cả (${set.sections.reduce((s,sec)=>s+sec.questions.length,0)} câu)`;
            allBtn.onclick = () => startSection(-1);
            container.appendChild(allBtn);
            set.sections.forEach((sec, i) => {
                const btn = document.createElement('button');
                btn.className = 'section-btn w-full px-4 py-3 rounded-lg font-medium text-white bg-indigo-500';
                btn.textContent = `${sec.name} (${sec.questions.length} câu)`;
                btn.onclick = () => startSection(i);
                container.appendChild(btn);
            });
        }

        function startSection(secIdx) {
            const set = allSets[currentSet];
            if (secIdx === -1) {
                currentQuestions = set.sections.flatMap(s => s.questions);
            } else {
                currentQuestions = [...set.sections[secIdx].questions];
            }
            currentQuestions = shuffle(currentQuestions);
            current = 0; score = 0;
            document.getElementById('section-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function goBack() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('section-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
            return a;
        }

        function showQuestion() {
            const q = currentQuestions[current];
            document.getElementById('progress').textContent = `Câu ${current + 1}/${currentQuestions.length}`;
            document.getElementById('score-display').textContent = `Điểm: ${score}`;
            document.getElementById('question-text').textContent = q.q;
            const container = document.getElementById('answers');
            container.innerHTML = '';
            q.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 font-medium hover:border-indigo-400';
                btn.textContent = ans;
                btn.onclick = () => selectAnswer(i);
                container.appendChild(btn);
            });
        }

        function selectAnswer(idx) {
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach(b => b.disabled = true);
            const q = currentQuestions[current];
            if (idx === q.c) { score++; btns[idx].classList.add('correct'); }
            else { btns[idx].classList.add('incorrect'); btns[q.c].classList.add('correct'); }
            setTimeout(() => {
                current++;
                if (current < currentQuestions.length) showQuestion();
                else showResult();
            }, 1200);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const pct = Math.round(score / currentQuestions.length * 100);
            document.getElementById('result-score').textContent = `${score}/${currentQuestions.length} (${pct}%)`;
            document.getElementById('result-emoji').textContent = pct >= 75 ? '🎉' : pct >= 50 ? '👍' : '📚';
        }
    </script>
